name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild (for .NET Framework 4.8/4.8.1)
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore DLaB.Xrm.XrmToolBoxTools.sln

      - name: Build net48 with MSBuild.exe
        run: msbuild DLaB.Xrm.XrmToolBoxTools.sln /t:Build /p:Configuration=Release

#      - name: Build net10 projects
#        run: dotnet build DLaB.EarlyBoundGeneratorV2.Api/DLaB.EarlyBoundGeneratorV2.Api.csproj -c Release
        
      - name: Display build outputs
        shell: pwsh
        run: |
          Write-Host "Build outputs by framework:"
          Get-ChildItem -Path . -Recurse -Directory -Filter "bin" | 
            ForEach-Object { Get-ChildItem $_.FullName -Recurse -Filter "*.dll" } |
            Where-Object { $_.Directory.Name -match "net48|net481|net10\.0|Release" } |
            Select-Object FullName |
            Format-Table -AutoSize

      - name: Run tests
        run: dotnet test DLaB.Xrm.XrmToolBoxTools.sln -c Release --no-build --no-restore --logger "trx;LogFileName=test_results.trx" --verbosity normal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
