name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild (for net48)
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore DLaB.Xrm.XrmToolBoxTools.sln

      - name: Build solution
        run: dotnet build DLaB.Xrm.XrmToolBoxTools.sln -c Release --no-restore

      - name: Run tests
        uses: microsoft/vstest-action@v1.0.0
        with:
          testAssembly: |
            **/*Tests.dll
          searchFolder: .\
          runInParallel: true
          vstestLocationMethod: version
          vsTestVersion: latest
